name: Publish trending vocabulary

on:
  schedule:
    - cron: "30 4 * * *"
  workflow_dispatch:
    inputs:
      source_date:
        description: Last complete UTC date (YYYY-MM-DD); leave empty for yesterday
        required: false
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install deterministic text conversion dependency
        run: python3 -m pip install --disable-pip-version-check --require-hashes -r scripts/vocabulary/requirements.txt

      - name: Fetch and rank public vocabulary
        run: |
          date_argument=()
          if [[ -n "${{ inputs.source_date }}" ]]; then
            date_argument=(--date "${{ inputs.source_date }}")
          fi
          python3 scripts/vocabulary/fetch-wikimedia.py "${date_argument[@]}" --output "$RUNNER_TEMP/unsigned-pack.json"

      - name: Sign vocabulary pack
        env:
          READYTYPE_VOCABULARY_SIGNING_PRIVATE_KEY: ${{ secrets.READYTYPE_VOCABULARY_SIGNING_PRIVATE_KEY }}
        run: swift scripts/vocabulary/sign-pack.swift "$RUNNER_TEMP/unsigned-pack.json" "$RUNNER_TEMP/site/vocabulary/v1" 1.4.0

      - name: Verify generated files with app code
        env:
          READYTYPE_VOCABULARY_MANIFEST: ${{ runner.temp }}/site/vocabulary/v1/manifest.json
          READYTYPE_VOCABULARY_PACK: ${{ runner.temp }}/site/vocabulary/v1/pack.json
        run: swift test --filter HotVocabularyProductionContractTests/testGeneratedArtifactPassesAppVerifierWhenProvided

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ${{ runner.temp }}/site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
