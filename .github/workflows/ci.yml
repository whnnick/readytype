name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-build:
    name: Test and build macOS app
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Run tests
        run: swift test

      - name: Build app bundle
        run: scripts/build-app.sh

      - name: Scan for sensitive information
        run: python3 scripts/check-sensitive-info.py

      - name: Package app artifact
        run: scripts/package-app.sh ReadyType.app.zip

      - name: Package DMG artifact
        run: scripts/package-dmg.sh ReadyType.dmg

      - name: Upload app artifact
        uses: actions/upload-artifact@v7
        with:
          name: ReadyType.app
          path: ReadyType.app.zip
          if-no-files-found: error

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v7
        with:
          name: ReadyType.dmg
          path: ReadyType.dmg
          if-no-files-found: error
