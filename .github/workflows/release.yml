name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Test, package, and publish release
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate tag and app version
        run: |
          version="$(plutil -extract CFBundleShortVersionString raw ReadyType/ReadyType/Resources/ReadyTypeInfo.plist)"
          expected_tag="v${version}"
          if [[ "$GITHUB_REF_NAME" != "$expected_tag" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match app version $version." >&2
            exit 1
          fi

      - name: Run tests
        run: swift test

      - name: Validate analytics release configuration
        env:
          READYTYPE_TELEMETRYDECK_APP_ID: ${{ vars.READYTYPE_TELEMETRYDECK_APP_ID }}
        run: |
          if [[ ! "$READYTYPE_TELEMETRYDECK_APP_ID" =~ ^[0-9A-Fa-f]{8}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{12}$ ]]; then
            echo "Set the READYTYPE_TELEMETRYDECK_APP_ID repository variable before publishing." >&2
            exit 1
          fi

      - name: Build app bundle
        env:
          READYTYPE_TELEMETRYDECK_APP_ID: ${{ vars.READYTYPE_TELEMETRYDECK_APP_ID }}
        run: scripts/build-app.sh

      - name: Scan for sensitive information
        run: python3 scripts/check-sensitive-info.py

      - name: Package release files
        run: |
          scripts/package-app.sh ReadyType.app.zip
          scripts/package-dmg.sh ReadyType.dmg
          shasum -a 256 ReadyType.app.zip ReadyType.dmg > SHA256SUMS.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            ReadyType.app.zip \
            ReadyType.dmg \
            SHA256SUMS.txt \
            --title "ReadyType ${GITHUB_REF_NAME#v}" \
            --generate-notes \
            --verify-tag
